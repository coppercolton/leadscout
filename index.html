<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LeadScout — The lead you reach out to, already knows your name.</title>
  <meta name="description" content="AI-powered lead intelligence that builds living profiles of every prospect so your first message sounds like a second." />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    html, body, #root { height: 100%; }

    :root {
      --accent-hue: 240;
      --accent:         oklch(0.55 0.22 250);
      --accent-text:    oklch(0.45 0.22 250);
      --accent-soft:    oklch(0.55 0.22 250 / 0.10);
      --accent-line:    oklch(0.55 0.22 250 / 0.30);

      --bg:             oklch(0.995 0.003 240);
      --bg-elev:        oklch(0.975 0.005 240);

      --fg:             oklch(0.18 0.010 240);
      --fg-muted:       oklch(0.45 0.010 240);
      --fg-subtle:      oklch(0.62 0.008 240);

      --border:         oklch(0.85 0.010 240 / 0.85);
      --border-strong:  oklch(0.72 0.010 240);
      --hairline:       oklch(0.88 0.008 240 / 0.60);

      --good:           oklch(0.55 0.16 150);

      --font-sans:  'Inter', system-ui, -apple-system, sans-serif;
      --font-mono:  'JetBrains Mono', 'Fira Code', monospace;
      --font-serif: 'Playfair Display', Georgia, serif;
    }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font-sans);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.35; }
    }

    input, button { font-family: inherit; }
    input::placeholder { color: var(--fg-subtle); }

    /* Scrollbar */
    ::-webkit-scrollbar        { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track  { background: transparent; }
    ::-webkit-scrollbar-thumb  { background: var(--hairline); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border); }
  </style>

  <!-- React + ReactDOM (production) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- Babel standalone for JSX in the browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- ============================================================
       All JSX source files bundled into one Babel script block.
       Load order: primitives → design-canvas → app-screens → landing → render
       ============================================================ -->
  <script type="text/babel" data-presets="react">
    /* ─────────────────────────────────────────────────────────────
       SHARED HOOKS (one source of truth for all files below)
    ───────────────────────────────────────────────────────────── */
    const { useState, useEffect, useRef, useMemo, useContext, createContext, Children, Fragment } = React;
    // Aliases used inside landing.jsx
    const useSL = useState, useEL = useEffect, useRL = useRef;

    /* ─────────────────────────────────────────────────────────────
       PRIMITIVES  (icons, Btn, Card, Hairline, Meta, Pill, Avatar,
                    Placeholder, Rings)
    ───────────────────────────────────────────────────────────── */

    const Icon = ({ d, size = 16, stroke = 'currentColor', fill = 'none', sw = 1.5, children }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke={stroke}
           strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round" style={{ flexShrink: 0 }}>
        {d ? <path d={d} /> : children}
      </svg>
    );

    const Icons = {
      Arrow:       (p) => <Icon {...p} d="M5 12h14M13 6l6 6-6 6" />,
      ArrowUpRight:(p) => <Icon {...p} d="M7 17 17 7M8 7h9v9" />,
      Plus:        (p) => <Icon {...p} d="M12 5v14M5 12h14" />,
      Check:       (p) => <Icon {...p} d="M4 12l5 5L20 6" />,
      Dot:         (p) => <Icon {...p}><circle cx="12" cy="12" r="3" fill="currentColor" stroke="none" /></Icon>,
      Spark:       (p) => <Icon {...p} d="M12 3v4M12 17v4M3 12h4M17 12h4M6 6l2.5 2.5M15.5 15.5 18 18M6 18l2.5-2.5M15.5 8.5 18 6" />,
      Bot:         (p) => <Icon {...p}><rect x="4" y="7" width="16" height="12" rx="3" /><path d="M12 3v4M9 13h.01M15 13h.01M9 17h6" /></Icon>,
      Search:      (p) => <Icon {...p}><circle cx="11" cy="11" r="6" /><path d="m20 20-4-4" /></Icon>,
      Target:      (p) => <Icon {...p}><circle cx="12" cy="12" r="8" /><circle cx="12" cy="12" r="4" /><circle cx="12" cy="12" r="1" fill="currentColor" /></Icon>,
      User:        (p) => <Icon {...p}><circle cx="12" cy="8" r="4" /><path d="M4 21c0-4 4-6 8-6s8 2 8 6" /></Icon>,
      Mail:        (p) => <Icon {...p}><rect x="3" y="5" width="18" height="14" rx="2" /><path d="m3 7 9 6 9-6" /></Icon>,
      Briefcase:   (p) => <Icon {...p}><rect x="3" y="7" width="18" height="13" rx="2" /><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" /></Icon>,
      Activity:    (p) => <Icon {...p} d="M3 12h4l3-8 4 16 3-8h4" />,
      Chart:       (p) => <Icon {...p} d="M3 3v18h18M7 15l4-6 4 3 5-8" />,
      Flow:        (p) => <Icon {...p}><circle cx="6" cy="6" r="2.5" /><circle cx="18" cy="18" r="2.5" /><circle cx="18" cy="6" r="2.5" /><path d="M8 6h8M18 8v8" /></Icon>,
      Inbox:       (p) => <Icon {...p}><path d="M3 13h5l1 3h6l1-3h5" /><path d="M3 13V7a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v6" /></Icon>,
      List:        (p) => <Icon {...p} d="M4 6h16M4 12h16M4 18h10" />,
      Calendar:    (p) => <Icon {...p}><rect x="3" y="5" width="18" height="16" rx="2" /><path d="M3 10h18M8 3v4M16 3v4" /></Icon>,
      Link:        (p) => <Icon {...p} d="M10 14a4 4 0 0 0 5.7 0l3-3a4 4 0 0 0-5.7-5.7l-1.5 1.5M14 10a4 4 0 0 0-5.7 0l-3 3a4 4 0 0 0 5.7 5.7l1.5-1.5" />,
      Clock:       (p) => <Icon {...p}><circle cx="12" cy="12" r="9" /><path d="M12 7v5l3 2" /></Icon>,
      Building:    (p) => <Icon {...p}><rect x="4" y="3" width="16" height="18" /><path d="M9 8h.01M15 8h.01M9 12h.01M15 12h.01M9 16h.01M15 16h.01M10 21v-4h4v4" /></Icon>,
      Sun:         (p) => <Icon {...p}><circle cx="12" cy="12" r="4" /><path d="M12 3v2M12 19v2M3 12h2M19 12h2M5.6 5.6l1.4 1.4M17 17l1.4 1.4M5.6 18.4 7 17M17 7l1.4-1.4" /></Icon>,
      Moon:        (p) => <Icon {...p} d="M21 13A9 9 0 1 1 11 3a7 7 0 0 0 10 10z" />,
      Close:       (p) => <Icon {...p} d="M6 6l12 12M6 18 18 6" />,
      Menu:        (p) => <Icon {...p} d="M4 7h16M4 12h16M4 17h16" />,
      Filter:      (p) => <Icon {...p} d="M3 5h18l-7 9v6l-4-2v-4z" />,
      Linkedin:    (p) => <Icon {...p}><rect x="3" y="3" width="18" height="18" rx="2" /><path d="M8 10v7M8 7v.01M12 17v-4a2 2 0 0 1 4 0v4M12 10v7" /></Icon>,
      Globe:       (p) => <Icon {...p}><circle cx="12" cy="12" r="9" /><path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18" /></Icon>,
      News:        (p) => <Icon {...p}><rect x="3" y="5" width="18" height="14" rx="1" /><path d="M7 9h10M7 13h6M7 16h10" /></Icon>,
      Chat:        (p) => <Icon {...p} d="M4 6a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2h-6l-4 4v-4H6a2 2 0 0 1-2-2z" />,
      Pause:       (p) => <Icon {...p}><rect x="6" y="5" width="4" height="14" /><rect x="14" y="5" width="4" height="14" /></Icon>,
      Play:        (p) => <Icon {...p}><path d="M7 5v14l12-7z" fill="currentColor" stroke="none" /></Icon>,
      Trend:       (p) => <Icon {...p} d="M3 17l6-6 4 4 8-8M15 7h5v5" />,
      Zap:         (p) => <Icon {...p} d="M13 3 5 14h6l-2 7 9-12h-6z" />,
      Send:        (p) => <Icon {...p} d="M3 11 21 3l-7 18-3-8z" />,
      Copy:        (p) => <Icon {...p}><rect x="8" y="8" width="12" height="12" rx="2" /><path d="M16 8V5a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h3" /></Icon>,
      Shield:      (p) => <Icon {...p} d="M12 3 4 6v6c0 5 3.5 8 8 9 4.5-1 8-4 8-9V6z" />,
      Verified:    (p) => <Icon {...p}><path d="M9 12 11 14 15 10" /><path d="M12 3l2.5 2 3-.5L18 7.5l2 2-1 3 .5 3-2.5 1.5-1.5 2.5-3-.5-2 2-2-2-3 .5L4 15.5l.5-3-1-3 2-2L6 4.5l3 .5z" /></Icon>,
    };

    const Btn = ({ children, variant = 'primary', size = 'md', ...rest }) => {
      const sizes = {
        sm: { padding: '6px 12px', fontSize: 12, height: 28 },
        md: { padding: '10px 16px', fontSize: 13, height: 38 },
        lg: { padding: '14px 22px', fontSize: 14, height: 48 },
      };
      const variants = {
        primary:   { background: 'var(--fg)',          color: 'var(--bg)',        border: '1px solid var(--fg)' },
        secondary: { background: 'transparent',         color: 'var(--fg)',        border: '1px solid var(--border-strong)' },
        ghost:     { background: 'transparent',         color: 'var(--fg-muted)',  border: '1px solid transparent' },
        accent:    { background: 'var(--accent)',        color: 'oklch(0.14 0.006 60)', border: '1px solid var(--accent)' },
        outline:   { background: 'transparent',         color: 'var(--accent-text)', border: '1px solid var(--accent-line)' },
      };
      return (
        <button style={{
          ...sizes[size], ...variants[variant],
          display: 'inline-flex', alignItems: 'center', gap: 8,
          borderRadius: 999, fontWeight: 500, letterSpacing: '-0.005em',
          cursor: 'pointer', transition: 'all 0.15s ease',
          fontFamily: 'var(--font-sans)', whiteSpace: 'nowrap',
        }} {...rest}>{children}</button>
      );
    };

    const Card = ({ children, pad = 20, style, ...rest }) => (
      <div style={{ background: 'var(--bg-elev)', border: '1px solid var(--border)', borderRadius: 14, padding: pad, ...style }} {...rest}>{children}</div>
    );

    const Hairline = ({ vertical, style }) => (
      <div style={{ background: 'var(--hairline)', [vertical ? 'width' : 'height']: 1, [vertical ? 'height' : 'width']: '100%', ...style }} />
    );

    const Meta = ({ children, style, color }) => (
      <span style={{ fontFamily: 'var(--font-mono)', fontSize: 10, letterSpacing: '0.12em', textTransform: 'uppercase', color: color || 'var(--fg-subtle)', ...style }}>{children}</span>
    );

    const Pill = ({ children, tone = 'neutral', style, dot }) => {
      const tones = {
        neutral: { bg: 'var(--hairline)',                        fg: 'var(--fg-muted)',  dotC: 'var(--fg-subtle)' },
        accent:  { bg: 'var(--accent-soft)',                     fg: 'var(--accent-text)', dotC: 'var(--accent)' },
        good:    { bg: 'oklch(0.55 0.16 150 / 0.12)',           fg: 'oklch(0.42 0.16 150)', dotC: 'oklch(0.55 0.16 150)' },
        warn:    { bg: 'oklch(0.62 0.16 70 / 0.14)',            fg: 'oklch(0.48 0.16 70)',  dotC: 'oklch(0.62 0.16 70)' },
        bad:     { bg: 'oklch(0.58 0.20 25 / 0.12)',            fg: 'oklch(0.48 0.20 25)',  dotC: 'oklch(0.58 0.20 25)' },
      };
      const t = tones[tone];
      return (
        <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6, background: t.bg, color: t.fg, padding: '3px 9px', borderRadius: 999, fontFamily: 'var(--font-sans)', fontSize: 11, fontWeight: 500, letterSpacing: '-0.005em', ...style }}>
          {dot && <span style={{ width: 6, height: 6, borderRadius: '50%', background: t.dotC }} />}
          {children}
        </span>
      );
    };

    const Avatar = ({ name = '??', size = 32, hue }) => {
      const initials = name.split(' ').map(n => n[0]).slice(0, 2).join('').toUpperCase();
      const h = hue ?? ([...name].reduce((a, c) => a + c.charCodeAt(0), 0) * 37) % 360;
      return (
        <div style={{ width: size, height: size, borderRadius: '50%', background: `oklch(0.72 0.12 ${h} / 0.20)`, color: `oklch(0.38 0.14 ${h})`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: 'var(--font-sans)', fontSize: size * 0.38, fontWeight: 600, letterSpacing: '-0.02em', border: `1px solid oklch(0.62 0.12 ${h} / 0.30)`, flexShrink: 0 }}>{initials}</div>
      );
    };

    const Placeholder = ({ w = '100%', h = 200, label = 'image', style }) => (
      <div style={{ width: w, height: h, position: 'relative', overflow: 'hidden', background: `repeating-linear-gradient(135deg, var(--hairline) 0 8px, transparent 8px 16px)`, border: '1px solid var(--border)', borderRadius: 10, display: 'flex', alignItems: 'center', justifyContent: 'center', ...style }}>
        <span style={{ fontFamily: 'var(--font-mono)', fontSize: 10, color: 'var(--fg-subtle)', letterSpacing: '0.1em', textTransform: 'uppercase', background: 'var(--bg)', padding: '4px 8px', borderRadius: 4, border: '1px solid var(--border)' }}>{label}</span>
      </div>
    );

    const Rings = ({ size = 320, color, style }) => {
      const c = color || 'var(--accent)';
      const half = size / 2;
      return (
        <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={style} aria-hidden>
          {[1,2,3,4,5,6,7].map(i => <circle key={i} cx={half} cy={half} r={i*(half/8)} fill="none" stroke={c} strokeWidth="0.5" opacity={0.08+i*0.04} />)}
          <circle cx={half} cy={half} r="3" fill={c} />
        </svg>
      );
    };

    /* ─────────────────────────────────────────────────────────────
       LANDING PAGE
    ───────────────────────────────────────────────────────────── */

    function Landing({ brand = 'LeadScout', headline, hue = 240, heroVariant = 'split' }) {
      const h = headline || ['The lead you reach out to,', 'already knows your name.'];
      return (
        <div style={{ background: 'var(--bg)', color: 'var(--fg)', minHeight: '100%', fontFamily: 'var(--font-sans)' }}>
          <LandingNav brand={brand} />
          <HeroLive h={h} brand={brand} variant={heroVariant} />
          <LogoTicker />
          <ProfileDemo />
          <GlobeMap />
          <HowItWorks />
          <FeatureGrid />
          <StatsBanner />
          <SequencesSection />
          <SocialProof />
          <CTASection brand={brand} />
          <Footer brand={brand} />
        </div>
      );
    }

    function LandingNav({ brand }) {
      return (
        <div style={{ position: 'sticky', top: 0, zIndex: 10, background: 'color-mix(in oklch, var(--bg) 85%, transparent)', backdropFilter: 'blur(12px)', borderBottom: '1px solid var(--hairline)' }}>
          <div style={{ maxWidth: 1280, margin: '0 auto', padding: '18px 40px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
              <BrandMark />
              <span style={{ fontSize: 15, fontWeight: 500, letterSpacing: '-0.02em' }}>{brand}</span>
              <Pill tone="accent" dot style={{ marginLeft: 10, fontSize: 10 }}>Agent online</Pill>
            </div>
            <div style={{ display: 'flex', gap: 28, alignItems: 'center', fontSize: 13, color: 'var(--fg-muted)' }}>
              <a href="#product" style={{ color: 'inherit', textDecoration: 'none' }}>Product</a>
              <a href="#how" style={{ color: 'inherit', textDecoration: 'none' }}>How it works</a>
              <a href="#pricing" style={{ color: 'inherit', textDecoration: 'none' }}>Pricing</a>
              <a href="#changelog" style={{ color: 'inherit', textDecoration: 'none' }}>Changelog</a>
            </div>
            <div style={{ display: 'flex', gap: 10, alignItems: 'center' }}>
              <Btn variant="ghost" size="sm">Sign in</Btn>
              <Btn variant="primary" size="sm">Start free trial <Icons.Arrow size={14} /></Btn>
            </div>
          </div>
        </div>
      );
    }

    function BrandMark({ size = 22 }) {
      return (
        <svg width={size} height={size} viewBox="0 0 24 24" aria-hidden>
          <circle cx="12" cy="12" r="11" fill="none" stroke="var(--accent)" strokeWidth="1" opacity="0.4" />
          <circle cx="12" cy="12" r="7"  fill="none" stroke="var(--accent)" strokeWidth="1" opacity="0.7" />
          <circle cx="12" cy="12" r="3"  fill="var(--accent)" />
        </svg>
      );
    }

    function HeroLive({ h, brand, variant }) {
      const centered = variant === 'centered';
      return (
        <section style={{ maxWidth: 1280, margin: '0 auto', padding: centered ? '80px 40px 60px' : '72px 40px 60px', display: 'grid', gridTemplateColumns: centered ? '1fr' : '1.05fr 1fr', gap: 60, alignItems: 'center', position: 'relative' }}>
          <GridBackdrop />
          <div style={{ position: 'relative', textAlign: centered ? 'center' : 'left' }}>
            <div style={{ display: 'inline-flex', alignItems: 'center', gap: 10, marginBottom: 24, padding: '6px 12px', border: '1px solid var(--border)', borderRadius: 999 }}>
              <span style={{ width: 6, height: 6, borderRadius: '50%', background: 'var(--accent)', animation: 'pulse 1.8s ease-in-out infinite' }} />
              <Meta>v2.0 · PROSPECT PROFILES LIVE</Meta>
            </div>
            <h1 style={{ fontFamily: 'var(--font-serif)', fontSize: 'clamp(44px, 5.6vw, 82px)', fontWeight: 400, lineHeight: 0.97, letterSpacing: '-0.03em', margin: 0 }}>
              {h[0]}<br />
              <em style={{ fontStyle: 'italic', color: 'var(--accent-text)' }}>{h[1]}</em>
            </h1>
            <p style={{ fontSize: 18, lineHeight: 1.55, color: 'var(--fg-muted)', maxWidth: 520, marginTop: 24, marginInline: centered ? 'auto' : 0 }}>
              Most lead tools stop at a verified email. Ours keeps going — building a living profile of every prospect so your first message sounds like a second.
            </p>
            <div style={{ display: 'flex', gap: 28, marginTop: 36, flexWrap: 'wrap', justifyContent: centered ? 'center' : 'flex-start' }}>
              <StatChip k="2.4M" l="profiles built" />
              <StatChip k="94%" l="reply-worthy" />
              <StatChip k="24/7" l="autonomous" />
            </div>
          </div>
          <LiveAgentBox brand={brand} />
        </section>
      );
    }

    function GridBackdrop() {
      return (
        <div aria-hidden style={{ position: 'absolute', inset: -40, pointerEvents: 'none', zIndex: 0,
          background: `radial-gradient(circle at 50% 40%, color-mix(in oklch, var(--accent) 10%, transparent) 0%, transparent 60%),linear-gradient(to right, var(--hairline) 1px, transparent 1px) 0 0/60px 60px,linear-gradient(to bottom, var(--hairline) 1px, transparent 1px) 0 0/60px 60px`,
          maskImage: 'radial-gradient(ellipse at center, black 50%, transparent 85%)', opacity: 0.5 }} />
      );
    }

    function StatChip({ k, l }) {
      return (
        <div>
          <div style={{ fontFamily: 'var(--font-serif)', fontSize: 32, lineHeight: 1, letterSpacing: '-0.02em' }}>{k}</div>
          <Meta style={{ marginTop: 8, display: 'block' }}>{l}</Meta>
        </div>
      );
    }

    function LiveAgentBox({ brand }) {
      const prompts = ['VP RevOps · Series B fintech · US', 'Founders · dev tools · post-Seed', 'Heads of Sales · SaaS · 200–500 employees'];
      const [input, setInput] = useSL('');
      const [stage, setStage] = useSL('idle');
      const [log, setLog] = useSL([]);
      const [leads, setLeads] = useSL([]);
      const [email, setEmail] = useSL('');
      const timerRef = useRL([]);

      const clearTimers = () => { timerRef.current.forEach(t => clearTimeout(t)); timerRef.current = []; };

      const run = (prompt) => {
        clearTimers();
        const q = prompt ?? input;
        if (!q.trim()) return;
        setInput(q);
        setStage('running');
        setLog([]);
        setLeads([]);
        const steps = [
          { t: 80,   line: `→ Parsing brief: "${q}"` },
          { t: 380,  line: '→ Querying linkedin.com, crunchbase, maps…' },
          { t: 900,  line: '→ 184 candidates found · filtering by seniority' },
          { t: 1400, line: '→ 41 qualified · building profiles in parallel' },
          { t: 2100, line: '→ Verifying emails against company patterns' },
          { t: 2700, line: '✓ 41 profiles ready · 38 verified · 6.2s total', color: 'var(--good)' },
        ];
        steps.forEach(s => {
          const id = setTimeout(() => setLog(l => [...l, { line: s.line, color: s.color }]), s.t);
          timerRef.current.push(id);
        });
        const results = [
          { n: 'Maya Chen',     r: 'VP Revenue Ops',    c: 'Northfield Labs', rel: 9, dm: 'High' },
          { n: 'Rahul Desai',   r: 'Director of Sales', c: 'Candlepath',      rel: 8, dm: 'High' },
          { n: 'Liv Sørensen',  r: 'Head of GTM',       c: 'Meridian',        rel: 9, dm: 'High' },
          { n: 'Priya Shah',    r: 'RevOps Lead',       c: 'Fieldwork',       rel: 8, dm: 'Medium' },
        ];
        results.forEach((r, i) => {
          const id = setTimeout(() => setLeads(prev => [...prev, r]), 1600 + i * 350);
          timerRef.current.push(id);
        });
        const id = setTimeout(() => setStage('results'), 3100);
        timerRef.current.push(id);
      };

      const tryIt = () => setStage('signup');
      useEL(() => () => clearTimers(), []);

      return (
        <div style={{ position: 'relative', zIndex: 2 }}>
          <Rings size={520} style={{ position: 'absolute', right: -80, top: -60, opacity: 0.4, pointerEvents: 'none' }} />

      const I = Icons[icon];
      return (
        <div style={{ background: 'var(--bg-elev)', border: '1px solid var(--border)', borderRadius: 14, padding: 28, gridColumn: big ? 'span 1' : undefined, gridRow: big ? 'span 2' : undefined, display: 'flex', flexDirection: 'column', minHeight: big ? 360 : 170 }}>
          <div style={{ width: 40, height: 40, borderRadius: 10, background: 'var(--accent-soft)', color: 'var(--accent-text)', display: 'grid', placeItems: 'center' }}><I size={19} /></div>
          <div style={{ fontFamily: 'var(--font-serif)', fontSize: big ? 28 : 20, letterSpacing: '-0.02em', fontWeight: 400, lineHeight: 1.15, marginTop: big ? 24 : 18, marginBottom: 10 }}>{t}</div>
          <div style={{ fontSize: big ? 15 : 13, color: 'var(--fg-muted)', lineHeight: 1.55 }}>{s}</div>
          {big && <div style={{ marginTop: 'auto', paddingTop: 24 }}><MiniAgentTerminal /></div>}
        </div>
      );
    }

    function MiniAgentTerminal() {
      return (
        <div style={{ background: 'var(--bg)', border: '1px solid var(--hairline)', borderRadius: 10, padding: 14, fontFamily: 'var(--font-mono)', fontSize: 11, lineHeight: 1.8 }}>
          <div style={{ color: 'var(--fg-subtle)' }}>$ agent.run("VP RevOps · Series B fintech · US")</div>
          <div style={{ color: 'var(--fg-muted)' }}>→ searching linkedin.com...</div>
          <div style={{ color: 'var(--fg-muted)' }}>→ 184 candidates · filtering by seniority...</div>
          <div style={{ color: 'var(--accent-text)' }}>→ 41 qualified · building profiles</div>
          <div style={{ color: 'var(--good)' }}>✓ 41 leads saved · 38 verified · 6.2s</div>
        </div>
      );
    }

    function StatsBanner() {
      return (
        <section style={{ borderTop: '1px solid var(--hairline)', borderBottom: '1px solid var(--hairline)', padding: '60px 40px', background: 'var(--bg-elev)' }}>
          <div style={{ maxWidth: 1280, margin: '0 auto', display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 40 }}>
            <BigStat k="3.8×" l="reply rate vs. template" />
            <BigStat k="42%"  l="time saved per rep weekly" />
            <BigStat k="$180" l="avg cost per meeting booked" tone="accent" />
            <BigStat k="14d"  l="from signup to first win" />
          </div>
        </section>
      );
    }

    function BigStat({ k, l, tone }) {
      return (
        <div>
          <div style={{ fontFamily: 'var(--font-serif)', fontSize: 60, lineHeight: 1, letterSpacing: '-0.03em', color: tone === 'accent' ? 'var(--accent-text)' : 'var(--fg)' }}>{k}</div>
          <Meta style={{ display: 'block', marginTop: 10 }}>{l}</Meta>
        </div>
      );
    }

    function SequencesSection() {
      return (
        <section style={{ maxWidth: 1280, margin: '0 auto', padding: '100px 40px' }}>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1.2fr', gap: 80, alignItems: 'center' }}>
            <div>
              <Meta>SEQUENCES</Meta>
              <h2 style={{ fontFamily: 'var(--font-serif)', fontSize: 48, lineHeight: 1.05, letterSpacing: '-0.025em', margin: '16px 0 24px', fontWeight: 400 }}>
                Outreach that<br /><em style={{ color: 'var(--accent-text)' }}>earns a reply.</em>
              </h2>
              <p style={{ fontSize: 16, color: 'var(--fg-muted)', lineHeight: 1.6, maxWidth: 440 }}>
                Design cadences that reference the prospect's post from last week, not a generic "noticed your role at {'{{company}}'}."
              </p>
              <div style={{ marginTop: 24 }}><Btn variant="outline">See example sequence <Icons.Arrow size={14} /></Btn></div>
            </div>
            <SequenceDiagram />
          </div>
        </section>
      );
    }

    function SequenceDiagram() {
      return (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
          <SeqEmail day="Day 0" subject="Your Pavilion talk — one question"   body="Rahul — I watched your 'death of the dialing quota' talk twice. Particularly the bit about SDR tooling treating leads as rows..." />
          <SeqEmail day="Day 3" subject="Congrats on the Series B"           body="Saw the Redpoint announcement. Guessing the hiring plan just got louder — if you're thinking about tooling before the headcount..." dim />
          <SeqEmail day="Day 7" subject="Last note, I promise"               body="No reply needed. Leaving you with one thing: the 'rows-to-people' benchmark from our last 30 customers..." dim />
        </div>
      );
    }

    function SeqEmail({ day, subject, body, dim }) {
      return (
        <div style={{ background: 'var(--bg-elev)', border: '1px solid var(--border)', borderRadius: 12, padding: 18, opacity: dim ? 0.7 : 1, display: 'grid', gridTemplateColumns: '80px 1fr', gap: 16 }}>
          <div><Meta>{day}</Meta></div>
          <div>
            <div style={{ fontSize: 14, fontWeight: 500, marginBottom: 6 }}>{subject}</div>
            <div style={{ fontSize: 13, color: 'var(--fg-muted)', lineHeight: 1.55 }}>{body}</div>
          </div>
        </div>
      );
    }

    function SocialProof() {
      return (
        <section style={{ padding: '100px 40px', maxWidth: 1280, margin: '0 auto' }}>
          <Meta style={{ display: 'block', textAlign: 'center', marginBottom: 40 }}>WHAT OPERATORS SAY</Meta>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 24 }}>
            <Quote q="We stopped sending first-touch emails cold. The profile dossier basically writes the opening line for you."      a="Lena Park"    r="Head of Sales · Northfield" />
            <Quote q="Replaced two SDR tools and a VA. The agent ran all night and had 120 qualified profiles by standup."             a="Jordan Wei"   r="Founder · Candlepath" big />
            <Quote q="It's the difference between knowing someone's email and knowing something about them."                            a="Priya Shah"   r="RevOps · Meridian" />
          </div>
        </section>
      );
    }

    function Quote({ q, a, r, big }) {
      return (
        <div style={{ padding: 28, border: '1px solid var(--hairline)', borderRadius: 14, background: 'var(--bg-elev)', display: 'flex', flexDirection: 'column', gap: 20 }}>
          <div style={{ fontFamily: 'var(--font-serif)', fontSize: 32, color: 'var(--accent-text)', lineHeight: 0.6 }}>"</div>
          <div style={{ fontFamily: 'var(--font-serif)', fontSize: big ? 22 : 18, lineHeight: 1.4, letterSpacing: '-0.01em', fontWeight: 400, fontStyle: 'italic', flex: 1 }}>{q}</div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, paddingTop: 14, borderTop: '1px solid var(--hairline)' }}>
            <Avatar name={a} size={32} />
            <div>
              <div style={{ fontSize: 13, fontWeight: 500 }}>{a}</div>
              <div style={{ fontSize: 11.5, color: 'var(--fg-muted)' }}>{r}</div>
            </div>
          </div>
        </div>
      );
    }

    function CTASection({ brand }) {
      const [joined, setJoined] = useSL(false);
      const [email, setEmail] = useSL('');
      const submit = (e) => { e && e.preventDefault(); if (!email.trim()) return; setJoined(true); };
      return (
        <section id="pricing" style={{ maxWidth: 1280, margin: '0 auto', padding: '60px 40px 100px', scrollMarginTop: 80 }}>
          <div style={{ position: 'relative', overflow: 'hidden', background: 'var(--bg-elev)', border: '1px solid var(--border)', borderRadius: 24, padding: '80px 60px', textAlign: 'center' }}>
            <Rings size={700} style={{ position: 'absolute', left: '50%', top: '50%', transform: 'translate(-50%, -50%)', opacity: 0.4, pointerEvents: 'none' }} />
            <div style={{ position: 'relative' }}>
              <Meta>READY · NOT WAITING</Meta>
              <h2 style={{ fontFamily: 'var(--font-serif)', fontSize: 'clamp(40px, 5vw, 68px)', lineHeight: 1.02, letterSpacing: '-0.03em', fontWeight: 400, margin: '16px 0 0' }}>
                Your agent is already running.<br />
                <em style={{ color: 'var(--accent-text)' }}>Give it a brief.</em>
              </h2>
              <p style={{ fontSize: 17, color: 'var(--fg-muted)', marginTop: 24, maxWidth: 520, marginInline: 'auto' }}>Free for 14 days. No card. Cancel with a shrug.</p>
              {joined ? (
                <div style={{ marginTop: 36, display: 'inline-flex', alignItems: 'center', gap: 10, padding: '12px 18px', borderRadius: 999, background: 'var(--accent-soft)', border: '1px solid var(--accent-line)', color: 'var(--accent-text)', fontSize: 14, fontWeight: 500 }}>
                  <span style={{ width: 6, height: 6, borderRadius: '50%', background: 'var(--good)' }} />
                  You're on the list — we'll be in touch.
                </div>
              ) : (
                <div style={{ display: 'flex', gap: 12, justifyContent: 'center', marginTop: 36, flexWrap: 'wrap' }}>
                  <Btn variant="primary"   size="lg">Start free trial <Icons.Arrow size={16} /></Btn>
                  <form onSubmit={submit} style={{ display: 'flex', gap: 8, alignItems: 'center', background: 'var(--bg)', border: '1px solid var(--border-strong)', borderRadius: 999, padding: '4px 4px 4px 16px', height: 48 }}>
                    <input type="email" required value={email} onChange={e => setEmail(e.target.value)} placeholder="you@company.com"
                      style={{ background: 'transparent', border: 'none', outline: 'none', color: 'var(--fg)', fontSize: 14, fontFamily: 'inherit', width: 220 }} />
                    <Btn variant="accent" size="md" type="submit">Join the waitlist <Icons.Arrow size={14} /></Btn>
                  </form>
                </div>
              )}
            </div>
          </div>
        </section>
      );
    }

    function Footer({ brand }) {
      return (
        <footer id="changelog" style={{ borderTop: '1px solid var(--hairline)', padding: '40px', maxWidth: 1280, margin: '0 auto', display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: 20, scrollMarginTop: 80 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
            <BrandMark size={18} />
            <Meta>© 2026 {brand.toUpperCase()}. BUILT FOR SALES TEAMS, NOT DASHBOARDS.</Meta>
          </div>
          <div style={{ display: 'flex', gap: 24, fontSize: 12.5, color: 'var(--fg-muted)' }}>
            {['Privacy','Terms','Security','Changelog'].map(l => <a key={l} href="#" style={{ color: 'inherit', textDecoration: 'none' }}>{l}</a>)}
          </div>
        </footer>
      );
    }

    /* ─────────────────────────────────────────────────────────────
       RENDER
    ───────────────────────────────────────────────────────────── */
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Landing />);
  </script>
</body>
</html>
